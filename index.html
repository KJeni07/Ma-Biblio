<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Biblio 100 - Édition Prestige</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper-bg: #FAF9F6;
            --gold-accent: #C5A059;
            --deep-black: #1A1A1A;
            --muted-gold: #D4AF37;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--paper-bg);
            color: var(--deep-black);
            margin: 0;
            overflow-x: hidden;
        }

        h1, h2, .font-serif { font-family: 'Playfair Display', serif; }

        /* --- AUTHENTIFICATION STYLE --- */
        #auth-screen {
            background-color: var(--paper-bg);
            background-image: radial-gradient(rgba(197, 160, 89, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .auth-card {
            background: white;
            border: 1px solid rgba(197, 160, 89, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
        }

        /* --- APP STYLE --- */
        .view-section { display: none; }
        .view-section.active { display: block; }

        .tab-btn {
            padding-bottom: 12px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #94a3b8;
            transition: all 0.2s;
            border-bottom: 3px solid transparent;
        }
        .tab-btn.active {
            color: var(--gold-accent);
            border-bottom: 3px solid var(--gold-accent);
        }

        /* --- STYLE FICHE --- */
        .fiche-container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            max-width: 900px;
            margin: 0 auto 40px auto;
            position: relative;
            border: 1px solid rgba(197, 160, 89, 0.1);
        }

        .fiche-number {
            position: absolute;
            top: 25px;
            right: 30px;
            font-size: 16px;
            font-weight: 900;
            color: #f1f1f1;
        }

        .fiche-title {
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1.1;
            margin-bottom: 4px;
            letter-spacing: -0.02em;
        }

        .fiche-author {
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--gold-accent);
            margin-bottom: 30px;
        }

        .section-label {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        .fiche-summary {
            font-size: 15px;
            color: #444;
            font-style: italic;
            line-height: 1.6;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px solid #f9f9f9;
        }
        @media (min-width: 768px) { .info-grid { grid-template-columns: repeat(5, 1fr); } }

        .info-item { border-bottom: 2px solid #f9f9f9; padding-bottom: 8px; }
        .info-value { font-size: 13px; font-weight: 700; color: var(--deep-black); }

        .avis-box {
            background-color: #fcfbf8;
            border-radius: 12px;
            padding: 20px;
            margin-top: 10px;
            border-left: 4px solid var(--gold-accent);
        }

        .cover-box {
            width: 100%;
            max-width: 200px;
            aspect-ratio: 2/3;
            background: #eee;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* --- STYLE GRILLE --- */
        .grid-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .grid-thumb {
            width: 100%;
            aspect-ratio: 2/3;
            background: white;
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            transition: all 0.3s;
            overflow: hidden;
        }
        .grid-thumb:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 15px 30px rgba(197, 160, 89, 0.15);
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .star-filled { color: var(--gold-accent); }
        .star-empty { color: #e5e7eb; }
        .btn-gold-main { background-color: var(--gold-accent); color: white; }
    </style>
</head>
<body>

    <!-- ÉCRAN D'AUTHENTIFICATION -->
    <div id="auth-screen" class="fixed inset-0 z-[100] flex items-center justify-center p-6">
        <div class="auth-card w-full max-w-md rounded-3xl p-10 text-center">
            <div class="mb-8">
                <h1 class="text-3xl font-black italic uppercase tracking-tighter font-serif mb-2">
                    Ma Biblio <span style="color: var(--gold-accent)">100</span>
                </h1>
                <p id="auth-mode-title" class="text-[10px] uppercase tracking-[0.2em] text-gray-400 font-bold">Connexion Membre</p>
            </div>

            <form id="auth-form" class="space-y-5 text-left">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1 mb-2 block">Adresse Email</label>
                    <input type="email" id="email" required class="modal-input !mb-0" placeholder="exemple@mail.com">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1 mb-2 block">Mot de passe</label>
                    <input type="password" id="password" required class="modal-input !mb-0" placeholder="••••••••">
                </div>
                <button type="submit" id="auth-submit-btn" class="w-full py-4 btn-gold-main rounded-xl font-bold uppercase tracking-widest text-xs shadow-lg shadow-yellow-900/20 mt-4">
                    Ouvrir ma collection
                </button>
            </form>
            
            <p id="auth-error" class="text-red-500 text-[11px] mt-4 font-bold uppercase hidden"></p>
            
            <div class="mt-6">
                <button onclick="toggleAuthMode()" id="toggle-auth-btn" class="text-[10px] text-gray-400 font-bold uppercase tracking-widest hover:text-gold-accent">
                    Pas encore de compte ? S'inscrire
                </button>
            </div>
        </div>
    </div>

    <!-- CONTENU DE L'APPLICATION -->
    <div id="app-content" class="hidden opacity-0 transition-opacity duration-700">
        <div class="max-w-6xl mx-auto px-6 py-10">
            <!-- Header -->
            <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-10">
                <h1 class="text-3xl font-black italic uppercase tracking-tighter font-serif">Ma Biblio <span style="color: var(--gold-accent)">100</span></h1>
                <div class="flex items-center gap-3">
                    <span id="user-display" class="text-[10px] font-bold text-gray-400 uppercase mr-2"></span>
                    <button onclick="logout()" class="text-[10px] font-bold uppercase tracking-widest px-4 py-2 text-red-400 hover:text-red-600 border border-red-100 rounded-lg">Déconnexion</button>
                </div>
            </div>

            <!-- Navigation -->
            <div class="flex gap-10 border-b border-slate-100 mb-12">
                <button onclick="showSection('grille')" id="btn-grille" class="tab-btn active">Ma Grille</button>
                <button onclick="showSection('fiches')" id="btn-fiches" class="tab-btn">Mes Fiches</button>
            </div>

            <!-- SECTION GRILLE -->
            <section id="section-grille" class="view-section active">
                <div id="grid-content" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-10"></div>
            </section>

            <!-- SECTION FICHES -->
            <section id="section-fiches" class="view-section">
                <div id="fiches-content" class="space-y-20"></div>
            </section>
        </div>
    </div>

    <!-- MODAL D'ÉDITION -->
    <div id="edit-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-[110] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-8 max-w-2xl w-full shadow-2xl max-h-[90vh] overflow-y-auto">
            <h2 class="text-2xl font-black mb-6 uppercase tracking-tight font-serif">Modifier la Fiche #<span id="modal-id"></span></h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 block">Titre du livre</label>
                    <input id="in-title" class="modal-input">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 block">Auteur</label>
                    <input id="in-author" class="modal-input">
                </div>
                <div class="md:col-span-2">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 block">URL de la couverture</label>
                    <input id="in-cover" class="modal-input">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 block">Note</label>
                    <select id="in-rating" class="modal-input">
                        <option value="0">Aucune étoile</option>
                        <option value="1">1 Étoile</option>
                        <option value="2">2 Étoiles</option>
                        <option value="3">3 Étoiles</option>
                        <option value="4">4 Étoiles</option>
                        <option value="5">5 Étoiles</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 block">Format</label>
                    <select id="in-format" class="modal-input">
                        <option value="-">-</option>
                        <option value="Livre">Livre</option>
                        <option value="Ebook">Ebook</option>
                        <option value="Audiobook">Audiobook</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 block">Genre</label>
                    <input id="in-genre" class="modal-input">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 block">Langue</label>
                    <input id="in-lang" class="modal-input">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 block">Date de début</label>
                    <input id="in-start" class="modal-input" placeholder="JJ/MM/AAAA">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 block">Date de fin</label>
                    <input id="in-end" class="modal-input" placeholder="JJ/MM/AAAA">
                </div>
            </div>

            <div class="mt-2">
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 block">Résumé</label>
                <textarea id="in-summary" class="modal-input h-24"></textarea>
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 block">Mon avis personnel</label>
                <textarea id="in-comment" class="modal-input h-24"></textarea>
            </div>
            
            <div class="flex gap-3 mt-6">
                <button onclick="closeModal()" class="flex-1 py-4 text-[10px] font-black uppercase bg-slate-50 rounded-xl">Annuler</button>
                <button onclick="saveToFirebase()" class="flex-1 py-4 text-[10px] font-black uppercase btn-gold-main rounded-xl">Enregistrer</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyALZ0tu1jU2OJbGrAmCcAFXVFB5os4-pfY",
            authDomain: "ma-biblio-b7966.firebaseapp.com",
            projectId: "ma-biblio-b7966",
            storageBucket: "ma-biblio-b7966.firebasestorage.app",
            messagingSenderId: "1025405426041",
            appId: "1:1025405426041:web:75b75d6c45a2f0313ef7a8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let library = [];
        let isSignUp = false;
        let currentUser = null;

        // --- AUTHENTIFICATION ---
        window.toggleAuthMode = () => {
            isSignUp = !isSignUp;
            document.getElementById('auth-mode-title').innerText = isSignUp ? "Création de Compte" : "Connexion Membre";
            document.getElementById('auth-submit-btn').innerText = isSignUp ? "Créer ma bibliothèque" : "Ouvrir ma collection";
            document.getElementById('toggle-auth-btn').innerText = isSignUp ? "Déjà un compte ? Se connecter" : "Pas encore de compte ? S'inscrire";
        };

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const errorEl = document.getElementById('auth-error');
            errorEl.classList.add('hidden');

            try {
                if (isSignUp) {
                    await createUserWithEmailAndPassword(auth, email, pass);
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
            } catch (err) {
                errorEl.innerText = "Erreur : " + err.message;
                errorEl.classList.remove('hidden');
            }
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('user-display').innerText = user.email;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                setTimeout(() => document.getElementById('app-content').classList.add('opacity-100'), 50);
                await loadUserLibrary();
            } else {
                document.getElementById('app-content').classList.add('hidden');
                document.getElementById('auth-screen').classList.remove('hidden');
            }
        });

        window.logout = () => signOut(auth);

        // --- DATA LOGIC ---
        async function loadUserLibrary() {
            const docRef = doc(db, "users_libs", currentUser.uid);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                library = docSnap.data().books;
            } else {
                library = Array.from({length: 100}, (_, i) => ({
                    id: i + 1, title: "", author: "", cover: "", rating: 0, summary: "", comment: "", genre: "", format: "-", lang: "", start: "", end: ""
                }));
                await setDoc(docRef, { books: library });
            }
            render();
        }

        window.saveToFirebase = async () => {
            const id = parseInt(document.getElementById('modal-id').innerText);
            const idx = library.findIndex(b => b.id === id);
            
            library[idx] = {
                ...library[idx],
                title: document.getElementById('in-title').value,
                author: document.getElementById('in-author').value,
                cover: document.getElementById('in-cover').value,
                rating: parseInt(document.getElementById('in-rating').value),
                genre: document.getElementById('in-genre').value,
                format: document.getElementById('in-format').value,
                lang: document.getElementById('in-lang').value,
                start: document.getElementById('in-start').value,
                end: document.getElementById('in-end').value,
                summary: document.getElementById('in-summary').value,
                comment: document.getElementById('in-comment').value
            };

            await setDoc(doc(db, "users_libs", currentUser.uid), { books: library });
            render();
            closeModal();
        };

        function render() {
            const grid = document.getElementById('grid-content');
            const fiches = document.getElementById('fiches-content');

            grid.innerHTML = library.map(book => `
                <div class="grid-item" onclick="jumpToFiche(${book.id})">
                    <div class="grid-thumb">
                        ${book.cover ? `<img src="${book.cover}" class="w-full h-full object-cover">` : `<span class="text-gray-200 font-bold">#${book.id}</span>`}
                    </div>
                    <div class="flex gap-0.5">${Array.from({length: 5}, (_, i) => `<span class="${i < book.rating ? 'star-filled' : 'star-empty'} text-[9px]">★</span>`).join('')}</div>
                </div>
            `).join('');

            fiches.innerHTML = library.map(book => `
                <div id="fiche-scroll-${book.id}" class="fiche-container">
                    <div class="fiche-number">#${book.id}</div>
                    <div class="flex flex-col md:flex-row gap-10">
                        <div class="cover-box shrink-0">
                            ${book.cover ? `<img src="${book.cover}" class="w-full h-full object-cover">` : `<span class="text-gray-100 text-5xl font-black">?</span>`}
                        </div>
                        <div class="flex-1">
                            <h2 class="fiche-title">${book.title || 'SANS TITRE'}</h2>
                            <h3 class="fiche-author">${book.author || 'AUTEUR INCONNU'}</h3>
                            <div class="mb-6">
                                <p class="section-label">Note :</p>
                                <div class="flex gap-1">${Array.from({length: 5}, (_, i) => `<span class="${i < book.rating ? 'star-filled' : 'star-empty'} text-2xl">★</span>`).join('')}</div>
                            </div>
                            <p class="section-label">Résumé :</p>
                            <p class="fiche-summary">${book.summary || 'Aucun résumé.'}</p>
                        </div>
                    </div>
                    <div class="info-grid">
                        <div class="info-item"><p class="section-label">Début :</p><p class="info-value">${book.start || '—'}</p></div>
                        <div class="info-item"><p class="section-label">Fin :</p><p class="info-value">${book.end || '—'}</p></div>
                        <div class="info-item"><p class="section-label">Genre :</p><p class="info-value">${book.genre || '—'}</p></div>
                        <div class="info-item"><p class="section-label">Format :</p><p class="info-value">${book.format || '—'}</p></div>
                        <div class="info-item"><p class="section-label">Langue :</p><p class="info-value">${book.lang || '—'}</p></div>
                    </div>
                    <div class="avis-box mt-6"><p class="section-label">Mon avis :</p><p class="text-sm italic">${book.comment || 'Non noté.'}</p></div>
                    <div class="flex justify-end mt-4"><button onclick="openEdit(${book.id})" class="px-5 py-2 rounded-lg bg-slate-50 text-slate-400 font-bold uppercase text-[10px] tracking-widest hover:text-yellow-600 transition-all">Modifier</button></div>
                </div>
            `).join('');
        }

        window.openEdit = (id) => {
            const b = library.find(x => x.id === id);
            document.getElementById('modal-id').innerText = id;
            document.getElementById('in-title').value = b.title || "";
            document.getElementById('in-author').value = b.author || "";
            document.getElementById('in-cover').value = b.cover || "";
            document.getElementById('in-rating').value = b.rating || 0;
            document.getElementById('in-genre').value = b.genre || "";
            document.getElementById('in-format').value = b.format || "-";
            document.getElementById('in-lang').value = b.lang || "";
            document.getElementById('in-start').value = b.start || "";
            document.getElementById('in-end').value = b.end || "";
            document.getElementById('in-summary').value = b.summary || "";
            document.getElementById('in-comment').value = b.comment || "";
            document.getElementById('edit-modal').classList.remove('hidden');
        };

        window.closeModal = () => document.getElementById('edit-modal').classList.add('hidden');
        
        window.showSection = (id) => {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('section-' + id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
        };

        window.jumpToFiche = (id) => {
            showSection('fiches');
            setTimeout(() => document.getElementById('fiche-scroll-' + id).scrollIntoView({behavior:'smooth', block:'center'}), 100);
        };
    </script>
</body>
</html>
