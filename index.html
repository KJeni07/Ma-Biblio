<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Biblio 100 - Édition Prestige</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper-bg: #FAF9F6;
            --gold-accent: #C5A059;
            --deep-black: #1A1A1A;
            --muted-gold: #D4AF37;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--paper-bg);
            color: var(--deep-black);
        }

        h1, h2, .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .view-section { display: none; }
        .view-section.active { display: block; }

        .tab-btn {
            padding-bottom: 12px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #94a3b8;
            transition: all 0.2s;
            border-bottom: 3px solid transparent;
        }
        .tab-btn.active {
            color: var(--gold-accent);
            border-bottom: 3px solid var(--gold-accent);
        }

        /* --- STYLE FICHE --- */
        .fiche-container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            max-width: 900px;
            margin: 0 auto 40px auto;
            position: relative;
            border: 1px solid rgba(197, 160, 89, 0.1);
        }

        .fiche-number {
            position: absolute;
            top: 25px;
            right: 30px;
            font-size: 16px;
            font-weight: 900;
            color: #f1f1f1;
        }

        .fiche-title {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--deep-black);
            line-height: 1;
            margin-bottom: 4px;
            letter-spacing: -0.02em;
        }

        .fiche-author {
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--gold-accent);
            margin-bottom: 30px;
        }

        .section-label {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        .fiche-summary {
            font-size: 15px;
            color: #444;
            font-style: italic;
            line-height: 1.6;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            margin-top: 40px;
            padding-top: 15px;
            border-top: 1px solid #f9f9f9;
        }

        .info-item {
            border-bottom: 2px solid #f9f9f9;
            padding-bottom: 8px;
        }

        .info-value {
            font-size: 14px;
            font-weight: 700;
            color: var(--deep-black);
        }

        .avis-box {
            background-color: #fcfbf8;
            border-radius: 12px;
            padding: 25px;
            margin-top: 15px;
            min-height: 80px;
            border-left: 4px solid var(--gold-accent);
        }

        .avis-text {
            color: #444;
            font-style: italic;
            font-weight: 500;
            font-size: 15px;
        }

        .cover-box {
            width: 220px;
            height: 330px;
            background: #eee;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* --- STYLE GRILLE --- */
        .grid-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }
        .grid-thumb {
            width: 100%;
            aspect-ratio: 2/3;
            background: white;
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            transition: all 0.3s;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .grid-thumb:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 15px 30px rgba(197, 160, 89, 0.15);
        }
        .grid-placeholder {
            font-size: 11px;
            font-weight: 900;
            color: #ddd;
            text-transform: uppercase;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            margin-bottom: 12px;
            font-size: 14px;
            background-color: #fff;
        }
        
        .modal-input:focus {
            outline: none;
            border-color: var(--gold-accent);
        }

        label {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 4px;
            display: block;
            margin-left: 4px;
        }

        .star-filled { color: var(--gold-accent); }
        .star-empty { color: #e5e7eb; }

        .btn-gold-main {
            background-color: var(--gold-accent);
            color: white;
            transition: all 0.2s;
        }
        .btn-gold-main:hover {
            background-color: #A68548;
        }

        /* --- AUTH STYLE --- */
        #auth-screen {
            position: fixed;
            inset: 0;
            background: var(--paper-bg);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <!-- ÉCRAN D'AUTHENTIFICATION -->
    <div id="auth-screen">
        <div class="text-center w-full max-w-sm px-6">
            <h1 class="text-4xl font-black italic uppercase tracking-tighter font-serif mb-2">Ma Biblio <span style="color: var(--gold-accent)">100</span></h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-12">Accès Sécurisé</p>
            
            <div class="space-y-4">
                <input type="password" id="auth-password" placeholder="Mot de passe" class="w-full p-4 rounded-xl border border-slate-200 text-center text-lg focus:ring-2 focus:ring-[#C5A059] outline-none transition-all">
                <button onclick="checkAuth()" class="w-full py-4 btn-gold-main rounded-xl font-black uppercase tracking-widest text-xs shadow-lg">Entrer dans la bibliothèque</button>
                <p id="auth-error" class="text-red-500 text-[10px] font-bold uppercase hidden">Mot de passe incorrect</p>
            </div>
        </div>
    </div>

    <!-- CONTENU PRINCIPAL (Masqué par défaut) -->
    <div id="main-content" class="hidden">
        <div class="max-w-6xl mx-auto px-6 py-10">
            <!-- Header -->
            <div class="flex justify-between items-center mb-10">
                <h1 class="text-3xl font-black italic uppercase tracking-tighter font-serif">Ma Biblio <span style="color: var(--gold-accent)">100</span></h1>
                <div class="flex gap-3">
                    <button onclick="exportJSON()" class="text-[10px] font-bold uppercase tracking-widest px-4 py-2 bg-white border border-slate-200 rounded-lg hover:bg-slate-50">Exporter</button>
                    <button onclick="document.getElementById('importFile').click()" class="text-[10px] font-bold uppercase tracking-widest px-4 py-2 bg-black text-white rounded-lg hover:opacity-80">Importer</button>
                    <input type="file" id="importFile" class="hidden" onchange="importJSON(event)">
                    <button onclick="logout()" class="text-[10px] font-bold uppercase tracking-widest px-4 py-2 bg-red-50 text-red-500 rounded-lg hover:bg-red-100">Quitter</button>
                </div>
            </div>

            <!-- Navigation -->
            <div class="flex gap-10 border-b border-slate-100 mb-12">
                <button onclick="showSection('grille')" id="btn-grille" class="tab-btn active">Ma Grille</button>
                <button onclick="showSection('fiches')" id="btn-fiches" class="tab-btn">Mes Fiches</button>
            </div>

            <!-- SECTION GRILLE -->
            <section id="section-grille" class="view-section active">
                <div id="grid-content" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-10">
                    <!-- Rempli par JS -->
                </div>
            </section>

            <!-- SECTION FICHES -->
            <section id="section-fiches" class="view-section">
                <div id="fiches-content" class="space-y-20">
                    <!-- Rempli par JS -->
                </div>
            </section>
        </div>
    </div>

    <!-- MODAL D'ÉDITION -->
    <div id="edit-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-8 max-w-2xl w-full shadow-2xl max-h-[90vh] overflow-y-auto">
            <h2 class="text-2xl font-black mb-6 uppercase tracking-tight font-serif">Modifier la Fiche #<span id="modal-id"></span></h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6">
                <div>
                    <label>Titre du livre</label>
                    <input id="in-title" placeholder="Ex: Le Petit Prince" class="modal-input">
                </div>
                <div>
                    <label>Auteur</label>
                    <input id="in-author" placeholder="Ex: Saint-Exupéry" class="modal-input">
                </div>
                <div class="md:col-span-2">
                    <label>URL de la couverture</label>
                    <input id="in-cover" placeholder="Lien vers l'image .jpg ou .png" class="modal-input">
                </div>
                <div>
                    <label>Note (Étoiles)</label>
                    <select id="in-rating" class="modal-input">
                        <option value="0">Aucune étoile</option>
                        <option value="1">1 Étoile</option>
                        <option value="2">2 Étoiles</option>
                        <option value="3">3 Étoiles</option>
                        <option value="4">4 Étoiles</option>
                        <option value="5">5 Étoiles</option>
                    </select>
                </div>
                <div>
                    <label>Format</label>
                    <select id="in-format" class="modal-input">
                        <option value="-">-</option>
                        <option value="Livre">Livre</option>
                        <option value="Ebook">Ebook</option>
                        <option value="Audiobook">Audiobook</option>
                    </select>
                </div>
                <div>
                    <label>Genre</label>
                    <input id="in-genre" list="list-genres" placeholder="Saisir ou choisir..." class="modal-input">
                    <datalist id="list-genres"></datalist>
                </div>
                <div>
                    <label>Langue</label>
                    <input id="in-lang" list="list-langs" placeholder="Saisir ou choisir..." class="modal-input">
                    <datalist id="list-langs"></datalist>
                </div>
                <div>
                    <label>Date de début</label>
                    <input id="in-start" placeholder="Ex: 12/05/2023" class="modal-input">
                </div>
                <div>
                    <label>Date de fin</label>
                    <input id="in-end" placeholder="Ex: 20/05/2023" class="modal-input">
                </div>
            </div>

            <div class="mt-2">
                <label>Résumé de l'histoire</label>
                <textarea id="in-summary" placeholder="De quoi parle le livre ?" class="modal-input h-24"></textarea>
            </div>
            <div>
                <label>Mon avis personnel</label>
                <textarea id="in-comment" placeholder="Qu'avez-vous pensé de cette lecture ?" class="modal-input h-24"></textarea>
            </div>
            
            <div class="flex gap-3 mt-6">
                <button onclick="closeModal()" class="flex-1 py-4 text-[10px] font-black uppercase tracking-widest bg-slate-50 rounded-xl hover:bg-slate-100 transition-colors">Annuler</button>
                <button onclick="saveBook()" class="flex-1 py-4 text-[10px] font-black uppercase tracking-widest btn-gold-main rounded-xl shadow-lg shadow-yellow-900/10 transition-colors">Enregistrer la fiche</button>
            </div>
        </div>
    </div>

    <script>
        let library = [];
        const COUNT = 100;
        const ACCESS_KEY = "1234"; // VOTRE MOT DE PASSE ICI

        let knownGenres = new Set(["Roman", "Thriller", "Fantastique", "Biographie", "Essai"]);
        let knownLangs = new Set(["Français", "Anglais", "Espagnol", "Japonais"]);

        // --- AUTH LOGIC ---
        function checkAuth() {
            const pwd = document.getElementById('auth-password').value;
            if(pwd === ACCESS_KEY) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                load();
            } else {
                const error = document.getElementById('auth-error');
                error.classList.remove('hidden');
                setTimeout(() => error.classList.add('hidden'), 2000);
            }
        }

        function logout() {
            window.location.reload();
        }

        // Touche Entrée pour l'auth
        document.getElementById('auth-password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkAuth();
        });

        // --- BIBLIO LOGIC ---
        function load() {
            const saved = localStorage.getItem('my_library_v100');
            if (saved) {
                library = JSON.parse(saved);
                if (library.length < COUNT) {
                    for (let i = library.length + 1; i <= COUNT; i++) {
                        library.push({
                            id: i, title: "", author: "", cover: "", rating: 0,
                            summary: "", start: "", end: "", genre: "", format: "-",
                            lang: "", comment: ""
                        });
                    }
                }
                library.forEach(b => {
                    if(b.genre) knownGenres.add(b.genre);
                    if(b.lang) knownLangs.add(b.lang);
                });
            } else {
                for (let i = 1; i <= COUNT; i++) {
                    library.push({
                        id: i, title: "", author: "", cover: "", rating: 0,
                        summary: "", start: "", end: "", genre: "", format: "-",
                        lang: "", comment: ""
                    });
                }
            }
            updateDatalists();
            render();
        }

        function updateDatalists() {
            document.getElementById('list-genres').innerHTML = Array.from(knownGenres).map(g => `<option value="${g}">`).join('');
            document.getElementById('list-langs').innerHTML = Array.from(knownLangs).map(l => `<option value="${l}">`).join('');
        }

        function render() {
            renderGrid();
            renderFiches();
        }

        function renderGrid() {
            const container = document.getElementById('grid-content');
            container.innerHTML = library.map(book => `
                <div class="grid-item" onclick="jumpToFiche(${book.id})">
                    <div class="grid-thumb">
                        ${book.cover ? `<img src="${book.cover}" class="w-full h-full object-cover">` : `<span class="grid-placeholder">#${book.id}</span>`}
                    </div>
                    <div class="flex gap-0.5">
                        ${[1,2,3,4,5].map(i => `<span class="text-[9px] ${i <= book.rating ? 'star-filled' : 'star-empty'}">★</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function renderFiches() {
            const container = document.getElementById('fiches-content');
            container.innerHTML = library.map(book => `
                <div id="fiche-scroll-${book.id}" class="fiche-container">
                    <div class="fiche-number">#${book.id}</div>
                    
                    <div class="flex flex-col md:flex-row gap-10">
                        <div class="cover-box shrink-0">
                            ${book.cover ? `<img src="${book.cover}" class="w-full h-full object-cover">` : `<span class="text-slate-100 font-black text-6xl">?</span>`}
                        </div>

                        <div class="flex-1">
                            <h2 class="fiche-title">${book.title || 'SANS TITRE'}</h2>
                            <h3 class="fiche-author">${book.author || 'AUTEUR INCONNU'}</h3>

                            <div class="mb-6">
                                <p class="section-label">Note :</p>
                                <div class="flex gap-1">
                                    ${[1,2,3,4,5].map(i => `<span class="text-2xl ${i <= book.rating ? 'star-filled' : 'star-empty'}">★</span>`).join('')}
                                </div>
                            </div>

                            <div>
                                <p class="section-label">Résumé :</p>
                                <p class="fiche-summary">${book.summary || 'Aucun résumé pour le moment.'}</p>
                            </div>
                        </div>
                    </div>

                    <div class="info-grid">
                        <div class="info-item">
                            <p class="section-label">Début :</p>
                            <p class="info-value">${book.start || '—'}</p>
                        </div>
                        <div class="info-item">
                            <p class="section-label">Fin :</p>
                            <p class="info-value">${book.end || '—'}</p>
                        </div>
                        <div class="info-item">
                            <p class="section-label">Genre :</p>
                            <p class="info-value">${book.genre || '—'}</p>
                        </div>
                        <div class="info-item">
                            <p class="section-label">Format :</p>
                            <p class="info-value">${book.format || '—'}</p>
                        </div>
                        <div class="info-item">
                            <p class="section-label">Langue :</p>
                            <p class="info-value">${book.lang || '—'}</p>
                        </div>
                    </div>

                    <div class="mt-8">
                        <p class="section-label">Mon avis personnel :</p>
                        <div class="avis-box">
                            <p class="avis-text">${book.comment || 'Aucun commentaire rédigé.'}</p>
                        </div>
                    </div>

                    <div class="mt-8 flex justify-end">
                        <button onclick="openEdit(${book.id})" class="px-5 py-2 rounded-lg bg-slate-50 text-slate-400 font-bold uppercase text-[10px] tracking-widest hover:bg-yellow-50 hover:text-yellow-600 transition-all">Modifier la fiche</button>
                    </div>
                </div>
            `).join('');
        }

        function showSection(id) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('section-' + id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
            if(id === 'grille') window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function jumpToFiche(id) {
            showSection('fiches');
            setTimeout(() => {
                const el = document.getElementById('fiche-scroll-' + id);
                if(el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        }

        let editingId = null;
        function openEdit(id) {
            editingId = id;
            const b = library.find(x => x.id === id);
            document.getElementById('modal-id').innerText = id;
            document.getElementById('in-title').value = b.title;
            document.getElementById('in-author').value = b.author;
            document.getElementById('in-cover').value = b.cover;
            document.getElementById('in-rating').value = b.rating;
            document.getElementById('in-genre').value = b.genre;
            document.getElementById('in-format').value = b.format || "-";
            document.getElementById('in-lang').value = b.lang;
            document.getElementById('in-start').value = b.start;
            document.getElementById('in-end').value = b.end;
            document.getElementById('in-summary').value = b.summary;
            document.getElementById('in-comment').value = b.comment;
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('edit-modal').classList.add('hidden');
        }

        function saveBook() {
            const idx = library.findIndex(x => x.id === editingId);
            const newGenre = document.getElementById('in-genre').value.trim();
            const newLang = document.getElementById('in-lang').value.trim();

            if(newGenre) knownGenres.add(newGenre);
            if(newLang) knownLangs.add(newLang);
            updateDatalists();

            library[idx] = {
                id: editingId,
                title: document.getElementById('in-title').value,
                author: document.getElementById('in-author').value,
                cover: document.getElementById('in-cover').value,
                rating: parseInt(document.getElementById('in-rating').value),
                genre: newGenre,
                format: document.getElementById('in-format').value,
                lang: newLang,
                start: document.getElementById('in-start').value,
                end: document.getElementById('in-end').value,
                summary: document.getElementById('in-summary').value,
                comment: document.getElementById('in-comment').value
            };
            
            localStorage.setItem('my_library_v100', JSON.stringify(library));
            render();
            closeModal();
        }

        function exportJSON() {
            const dataStr = JSON.stringify(library, null, 2);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Ma_Biblio_100_Export_${new Date().toLocaleDateString()}.json`;
            a.click();
        }

        function importJSON(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const imported = JSON.parse(event.target.result);
                    if(Array.isArray(imported)) {
                        library = imported;
                        if(library.length < COUNT) {
                             for (let i = library.length + 1; i <= COUNT; i++) {
                                library.push({ id: i, title: "", author: "", cover: "", rating: 0, summary: "", start: "", end: "", genre: "", format: "-", lang: "", comment: "" });
                            }
                        }
                        library.forEach(b => {
                            if(b.genre) knownGenres.add(b.genre);
                            if(b.lang) knownLangs.add(b.lang);
                        });
                        updateDatalists();
                        localStorage.setItem('my_library_v100', JSON.stringify(library));
                        render();
                    }
                } catch(err) {
                    console.error("Erreur lors de l'importation", err);
                }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
