<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Biblio 100 - Connexion Membre</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper-bg: #FAF9F6;
            --gold-accent: #C5A059;
            --deep-black: #1A1A1A;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--paper-bg);
            color: var(--deep-black);
            margin: 0;
        }

        .font-serif { font-family: 'Playfair Display', serif; }

        /* --- AUTHENTIFICATION --- */
        #auth-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background-color: var(--paper-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at 2px 2px, rgba(197, 160, 89, 0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }
        
        #main-content { display: none; }

        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            border: 1px solid rgba(197, 160, 89, 0.15);
            text-align: center;
            max-width: 420px;
            width: 100%;
        }

        .auth-input {
            width: 100%;
            background: #f8f8f8;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 15px;
            margin-bottom: 12px;
            outline: none;
            transition: all 0.3s;
        }

        .auth-input:focus {
            border-color: var(--gold-accent);
            background: white;
            box-shadow: 0 0 0 4px rgba(197, 160, 89, 0.1);
        }

        /* --- STYLE BIBLIOTHEQUE --- */
        .view-section { display: none; }
        .view-section.active { display: block; }

        .tab-btn {
            padding-bottom: 12px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #94a3b8;
            transition: all 0.2s;
            border-bottom: 3px solid transparent;
        }
        .tab-btn.active {
            color: var(--gold-accent);
            border-bottom: 3px solid var(--gold-accent);
        }

        .fiche-container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.03);
            max-width: 950px;
            margin: 0 auto 60px auto;
            position: relative;
            border: 1px solid rgba(197, 160, 89, 0.08);
        }

        .fiche-number {
            position: absolute;
            top: 25px;
            right: 30px;
            font-size: 16px;
            font-weight: 900;
            color: #f1f1f1;
        }

        .fiche-title {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--deep-black);
            line-height: 1.1;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .fiche-author {
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--gold-accent);
            margin-bottom: 35px;
            letter-spacing: 0.05em;
        }

        .section-label {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            color: #a1a1a1;
            margin-bottom: 10px;
            letter-spacing: 0.08em;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            margin-top: 40px;
            padding-top: 25px;
            border-top: 1px solid #f5f5f5;
        }

        .info-value {
            font-size: 14px;
            font-weight: 700;
            color: var(--deep-black);
        }

        .cover-box {
            width: 230px;
            height: 345px;
            background: #fdfdfd;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 15px 15px 30px rgba(0,0,0,0.08);
            border: 1px solid #eee;
        }

        .grid-thumb {
            width: 100%;
            aspect-ratio: 2/3;
            background: white;
            border: 1px solid rgba(0,0,0,0.04);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }
        .grid-thumb:hover { 
            transform: translateY(-10px) scale(1.02); 
            box-shadow: 0 20px 40px rgba(197, 160, 89, 0.2);
        }

        .star-filled { color: var(--gold-accent); }
        .star-empty { color: #e5e7eb; }

        .btn-gold-main {
            background-color: var(--gold-accent);
            color: white;
            transition: all 0.3s;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }
        .btn-gold-main:hover {
            background-color: #A68548;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(166, 133, 72, 0.3);
        }

        #loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.9);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="flex flex-col items-center">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-[#C5A059] mb-4"></div>
            <p class="section-label">Chargement de votre univers...</p>
        </div>
    </div>

    <!-- Écran de Connexion / Pseudo + Password -->
    <div id="auth-screen">
        <div class="auth-card">
            <div class="mb-8">
                <h1 class="text-3xl font-black italic uppercase tracking-tighter font-serif mb-1">Ma Biblio <span style="color: var(--gold-accent)">100</span></h1>
                <p class="section-label">Édition Collectionneur</p>
            </div>
            
            <div class="text-left space-y-4">
                <div>
                    <label class="section-label ml-1">Nom d'utilisateur / Pseudo</label>
                    <input type="text" id="auth-username" class="auth-input" placeholder="Ex: JeanDupont">
                </div>
                <div>
                    <label class="section-label ml-1">Mot de passe</label>
                    <input type="password" id="auth-password" class="auth-input" placeholder="••••••••">
                </div>
            </div>

            <button onclick="handleAuth()" class="w-full py-4 mt-4 rounded-xl btn-gold-main shadow-lg">Ouvrir ma collection</button>
            
            <div class="mt-6 p-4 bg-amber-50 rounded-lg border border-amber-100">
                <p class="text-[10px] text-amber-700 leading-relaxed font-medium">
                    Note : Si le compte n'existe pas, il sera créé automatiquement avec ces identifiants lors de votre première sauvegarde.
                </p>
            </div>
        </div>
    </div>

    <!-- Contenu Principal -->
    <div id="main-content">
        <div class="max-w-6xl mx-auto px-6 py-10">
            <header class="flex flex-col md:flex-row justify-between items-center mb-16 gap-6">
                <div>
                    <h1 class="text-4xl font-black italic uppercase tracking-tighter font-serif">Ma Biblio <span style="color: var(--gold-accent)">100</span></h1>
                    <p class="text-[10px] font-bold text-gray-400 tracking-[0.2em] uppercase mt-1">
                        Collection de <span id="display-name" class="text-gray-900">...</span>
                    </p>
                </div>
                <div class="flex gap-4">
                    <button onclick="location.reload()" class="text-[10px] font-bold uppercase tracking-widest px-6 py-3 bg-white border border-gray-100 rounded-full hover:bg-gray-50 transition-colors shadow-sm">
                        Déconnexion
                    </button>
                </div>
            </header>

            <nav class="flex gap-10 border-b border-slate-100 mb-12">
                <button onclick="showSection('grille')" id="btn-grille" class="tab-btn active">Ma Grille</button>
                <button onclick="showSection('fiches')" id="btn-fiches" class="tab-btn">Détails des Fiches</button>
            </nav>

            <section id="section-grille" class="view-section active">
                <div id="grid-content" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-10"></div>
            </section>

            <section id="section-fiches" class="view-section">
                <div id="fiches-content" class="space-y-10"></div>
            </section>
        </div>
    </div>

    <!-- MODAL D'ÉDITION -->
    <div id="edit-modal" class="fixed inset-0 bg-black/70 backdrop-blur-md hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-2xl w-full shadow-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black uppercase tracking-tight font-serif">Fiche #<span id="modal-id"></span></h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-black">✕</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">
                <div class="md:col-span-2">
                    <label class="section-label">Titre du livre</label>
                    <input id="in-title" class="auth-input mb-0" placeholder="Le titre original...">
                </div>
                <div>
                    <label class="section-label">Auteur</label>
                    <input id="in-author" class="auth-input mb-0" placeholder="Nom de l'auteur...">
                </div>
                <div>
                    <label class="section-label">URL de la Couverture</label>
                    <input id="in-cover" class="auth-input mb-0" placeholder="Lien .jpg ou .png">
                </div>
                <div>
                    <label class="section-label">Note</label>
                    <select id="in-rating" class="auth-input mb-0">
                        <option value="0">Aucune note</option>
                        <option value="1">⭐ (Très décevant)</option>
                        <option value="2">⭐⭐ (Moyen)</option>
                        <option value="3">⭐⭐⭐ (Bon livre)</option>
                        <option value="4">⭐⭐⭐⭐ (Excellent)</option>
                        <option value="5">⭐⭐⭐⭐⭐ (Chef-d'œuvre)</option>
                    </select>
                </div>
                <div>
                    <label class="section-label">Format</label>
                    <select id="in-format" class="auth-input mb-0">
                        <option value="-">-</option>
                        <option value="Papier">Papier</option>
                        <option value="Ebook">Ebook</option>
                        <option value="Audiobook">Audiobook</option>
                    </select>
                </div>
                <div><label class="section-label">Genre</label><input id="in-genre" class="auth-input mb-0"></div>
                <div><label class="section-label">Langue</label><input id="in-lang" class="auth-input mb-0"></div>
                <div><label class="section-label">Date Début</label><input id="in-start" class="auth-input mb-0" type="text" placeholder="JJ/MM/AAAA"></div>
                <div><label class="section-label">Date Fin</label><input id="in-end" class="auth-input mb-0" type="text" placeholder="JJ/MM/AAAA"></div>
            </div>
            
            <div class="mt-6">
                <label class="section-label">Résumé de l'œuvre</label>
                <textarea id="in-summary" class="auth-input h-32 mb-0" placeholder="De quoi parle ce livre ?"></textarea>
            </div>
            <div class="mt-4">
                <label class="section-label">Votre avis personnel</label>
                <textarea id="in-comment" class="auth-input h-32 mb-0" placeholder="Qu'avez-vous ressenti ?"></textarea>
            </div>

            <div class="flex gap-4 mt-10">
                <button onclick="closeModal()" class="flex-1 py-4 text-[11px] font-black uppercase tracking-widest bg-gray-50 rounded-xl hover:bg-gray-100 transition-colors">Fermer</button>
                <button onclick="saveBook()" class="flex-1 py-4 text-[11px] font-black uppercase tracking-widest btn-gold-main rounded-xl">Enregistrer la fiche</button>
            </div>
        </div>
    </div>

    <!-- Firebase Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'ma-biblio-100-v2';

        let library = [];
        let currentUserId = null;
        const TOTAL_BOOKS = 100;

        // Fonction simple pour générer un ID à partir du pseudo + pass (pour l'exemple)
        function generateSecureId(user, pass) {
            return btoa(user.trim().toLowerCase() + "_" + pass.trim()).replace(/=/g, "");
        }

        window.handleAuth = async () => {
            const user = document.getElementById('auth-username').value;
            const pass = document.getElementById('auth-password').value;

            if (!user || !pass) return alert("Veuillez remplir le pseudo et le mot de passe.");
            
            showLoading(true);
            try {
                // On utilise le couple pseudo/pass pour identifier l'espace de stockage
                currentUserId = generateSecureId(user, pass);
                
                await signInAnonymously(auth);
                
                document.getElementById('display-name').innerText = user;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                
                initLibrary();
            } catch (error) {
                console.error(error);
                alert("Erreur lors de l'accès à la bibliothèque.");
            } finally {
                showLoading(false);
            }
        };

        async function initLibrary() {
            // Chemin Firestore : public/data/libraries/{userId}
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'libraries', currentUserId);
            
            onSnapshot(docRef, (snap) => {
                if (snap.exists()) {
                    library = snap.data().books;
                } else {
                    // Première connexion : créer la liste de 100 emplacements
                    library = Array.from({length: TOTAL_BOOKS}, (_, i) => ({
                        id: i + 1, title: "", author: "", cover: "", rating: 0,
                        summary: "", start: "", end: "", genre: "", format: "-",
                        lang: "", comment: ""
                    }));
                    saveToCloud();
                }
                render();
            }, (err) => console.error("Erreur Firestore:", err));
        }

        async function saveToCloud() {
            if (!currentUserId) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'libraries', currentUserId);
            await setDoc(docRef, { books: library, updatedAt: new Date() });
        }

        function showLoading(show) {
            document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
        }

        // --- Moteur de Rendu ---
        window.render = () => {
            // Grille
            const grid = document.getElementById('grid-content');
            grid.innerHTML = library.map(book => `
                <div class="grid-item" onclick="jumpToFiche(${book.id})">
                    <div class="grid-thumb">
                        ${book.cover ? `<img src="${book.cover}" class="w-full h-full object-cover">` : `<span class="section-label" style="font-size:14px; color:#ddd">#${book.id}</span>`}
                    </div>
                    <div class="text-center">
                        <div class="flex justify-center gap-0.5 mb-1">
                            ${[1,2,3,4,5].map(i => `<span class="text-[10px] ${i <= book.rating ? 'star-filled' : 'star-empty'}">★</span>`).join('')}
                        </div>
                        <p class="text-[9px] font-black uppercase truncate px-2 text-gray-400">${book.title || 'À lire'}</p>
                    </div>
                </div>
            `).join('');

            // Fiches détaillées
            const fiches = document.getElementById('fiches-content');
            fiches.innerHTML = library.map(book => `
                <div id="fiche-scroll-${book.id}" class="fiche-container">
                    <div class="fiche-number">PROJET 100 / №${book.id}</div>
                    <div class="flex flex-col lg:flex-row gap-12">
                        <div class="cover-box shrink-0 mx-auto lg:mx-0">
                            ${book.cover ? `<img src="${book.cover}" class="w-full h-full object-cover">` : `<span class="text-slate-100 font-black text-7xl font-serif">${book.id}</span>`}
                        </div>
                        <div class="flex-1">
                            <h2 class="fiche-title">${book.title || 'FICHE EN ATTENTE'}</h2>
                            <h3 class="fiche-author">${book.author || 'Auteur non renseigné'}</h3>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div>
                                    <p class="section-label">Résumé & Contexte</p>
                                    <p class="text-sm leading-relaxed text-gray-600 italic">"${book.summary || 'Aucun résumé disponible pour le moment.'}"</p>
                                </div>
                                <div>
                                    <p class="section-label">Note du lecteur</p>
                                    <div class="flex gap-1 mb-4">
                                        ${[1,2,3,4,5].map(i => `<span class="text-2xl ${i <= (book.rating || 0) ? 'star-filled' : 'star-empty'}">★</span>`).join('')}
                                    </div>
                                    <p class="section-label">Avis Personnel</p>
                                    <p class="text-sm leading-relaxed text-gray-700 font-medium">${book.comment || 'Pas encore d\'avis rédigé.'}</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="info-grid">
                        <div class="info-item"><p class="section-label">Lecture</p><p class="info-value">${book.start || '-'} / ${book.end || '-'}</p></div>
                        <div class="info-item"><p class="section-label">Genre</p><p class="info-value">${book.genre || '-'}</p></div>
                        <div class="info-item"><p class="section-label">Support</p><p class="info-value">${book.format || '-'}</p></div>
                        <div class="info-item"><p class="section-label">Langue</p><p class="info-value">${book.lang || '-'}</p></div>
                        <div class="info-item flex items-end justify-end">
                             <button onclick="openEdit(${book.id})" class="px-4 py-2 bg-slate-50 rounded-lg text-[9px] font-bold uppercase tracking-tighter hover:bg-amber-50 hover:text-amber-700 transition-all">Éditer la fiche</button>
                        </div>
                    </div>
                </div>
            `).join('');
        };

        window.showSection = (id) => {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('section-' + id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
            window.scrollTo({top: 0, behavior: 'smooth'});
        };

        window.jumpToFiche = (id) => {
            showSection('fiches');
            setTimeout(() => {
                const el = document.getElementById('fiche-scroll-' + id);
                if(el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 150);
        };

        let editingId = null;
        window.openEdit = (id) => {
            editingId = id;
            const b = library.find(x => x.id === id);
            document.getElementById('modal-id').innerText = id;
            document.getElementById('in-title').value = b.title || "";
            document.getElementById('in-author').value = b.author || "";
            document.getElementById('in-cover').value = b.cover || "";
            document.getElementById('in-rating').value = b.rating || 0;
            document.getElementById('in-genre').value = b.genre || "";
            document.getElementById('in-format').value = b.format || "-";
            document.getElementById('in-lang').value = b.lang || "";
            document.getElementById('in-start').value = b.start || "";
            document.getElementById('in-end').value = b.end || "";
            document.getElementById('in-summary').value = b.summary || "";
            document.getElementById('in-comment').value = b.comment || "";
            document.getElementById('edit-modal').classList.remove('hidden');
        };

        window.closeModal = () => document.getElementById('edit-modal').classList.add('hidden');

        window.saveBook = async () => {
            const idx = library.findIndex(x => x.id === editingId);
            library[idx] = {
                id: editingId,
                title: document.getElementById('in-title').value,
                author: document.getElementById('in-author').value,
                cover: document.getElementById('in-cover').value,
                rating: parseInt(document.getElementById('in-rating').value),
                genre: document.getElementById('in-genre').value,
                format: document.getElementById('in-format').value,
                lang: document.getElementById('in-lang').value,
                start: document.getElementById('in-start').value,
                end: document.getElementById('in-end').value,
                summary: document.getElementById('in-summary').value,
                comment: document.getElementById('in-comment').value
            };
            
            showLoading(true);
            try {
                await saveToCloud();
                closeModal();
            } catch (e) {
                alert("Erreur de sauvegarde.");
            } finally {
                showLoading(false);
            }
        };
    </script>
</body>
</html>
